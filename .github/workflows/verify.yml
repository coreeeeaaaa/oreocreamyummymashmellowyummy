name: Verify Public Harness

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Public safety scan
        run: python3 harness/public_safety_scan.py .

      - name: Validate public packets
        run: python3 harness/validate_public_packet.py schemas/public-judgment-packet.schema.json examples/software-feature-review.json examples/research-direction-review.json fixtures/meta/valid_pass_scoped.json

      - name: Run meta fixtures
        run: python3 harness/run_meta_fixtures.py
